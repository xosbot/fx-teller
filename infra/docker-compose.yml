name: fxteller

services:
  api:
    build:
      context: ../apps/backend
      dockerfile: ../../infra/Dockerfile.api
    image: fxteller-api:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://fxteller:${POSTGRES_PASSWORD}@db:5432/fxteller
      JWT_SECRET: ${JWT_SECRET:-change-me-in-prod}
      HMS_APP_ACCESS_KEY: ${HMS_APP_ACCESS_KEY:-dev}
      HMS_APP_SECRET: ${HMS_APP_SECRET:-dev}
      HMS_TEMPLATE_ID: ${HMS_TEMPLATE_ID:-dev}
      RZP_KEY_ID: ${RZP_KEY_ID:-rzp_test_xxx}
      RZP_KEY_SECRET: ${RZP_KEY_SECRET:-dev}
      RZP_WEBHOOK_SECRET: ${RZP_WEBHOOK_SECRET:-dev}
      RZP_PLAN_MONTHLY: ${RZP_PLAN_MONTHLY:-plan_monthly}
    networks: [internal]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build:
      context: ../apps/host-console
      dockerfile: ../../infra/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000/api}
    image: fxteller-web:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
    networks: [internal]

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: fxteller
      POSTGRES_USER: fxteller
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fxteller}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backups:/backups
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fxteller -d fxteller"]
      interval: 10s
      timeout: 5s
      retries: 5

  swag:
    image: lscr.io/linuxserver/swag:latest
    restart: unless-stopped
    cap_add: [NET_ADMIN]
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Asia/Kolkata
      URL: ${DOMAIN:-fxteller.local}
      SUBDOMAINS: www,api,app
      VALIDATION: http
      EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      STAGING: "false"
      SWAG_AUTORELOAD: "true"
    volumes:
      - ./swag:/config
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
      - web
    networks: [internal]

volumes:
  pgdata:

networks:
  internal:
    driver: bridge
